name: Vtrack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          
      - name: Lint with flake8 and black
        run: |
          black --check backend/
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Type checking with mypy
        run: |
          mypy backend/src/
          
      - name: Run unit & integration tests
        run: |
          pytest backend/tests/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install --legacy-peer-deps
        
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  deploy-backend:
    needs: [backend-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image for Backend
        run: docker build -t vtrack-backend ./backend
      # Deploy to Hugging Face Spaces goes here
      - name: Deploy to HF Spaces
        run: echo "Deploying to Hugging Face Spaces..."

  deploy-frontend:
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # Deploy to Vercel goes here
      - name: Deploy to Vercel
        run: echo "Deploying to Vercel..."
